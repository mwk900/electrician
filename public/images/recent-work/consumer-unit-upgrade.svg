<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Consumer Unit Upgrade</title>
  <desc id="desc">Illustration of a modern consumer unit with labeled breakers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1119"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="breaker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect x="220" y="120" width="760" height="520" rx="18" fill="url(#panel)" stroke="#94a3b8" stroke-width="4"/>

  <rect x="255" y="165" width="340" height="32" rx="6" fill="#0f172a"/>
  <text x="275" y="187" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#f8fafc" letter-spacing="1">CONSUMER UNIT</text>
  <text x="620" y="188" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a" font-weight="700">RCD PROTECTED</text>

  <g transform="translate(270 230)">
    <rect width="660" height="360" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <g transform="translate(20 24)">
      <rect width="80" height="300" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="12" y="24" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0f172a">MAIN</text>
      <rect x="20" y="42" width="40" height="90" rx="4" fill="#334155"/>
      <rect x="26" y="52" width="28" height="16" rx="3" fill="#f59e0b"/>
      <rect x="26" y="74" width="28" height="16" rx="3" fill="#22c55e"/>
    </g>

    <g transform="translate(130 24)">
      <text x="0" y="-6" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#475569">CIRCUITS</text>
      <g>
        <rect x="0" y="0" width="500" height="46" rx="6" fill="url(#breaker)"/>
        <rect x="10" y="12" width="18" height="22" rx="3" fill="#22c55e"/>
        <text x="40" y="29" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e2e8f0">LIGHTING</text>
      </g>
      <g transform="translate(0 54)">
        <rect x="0" y="0" width="500" height="46" rx="6" fill="url(#breaker)"/>
        <rect x="10" y="12" width="18" height="22" rx="3" fill="#22c55e"/>
        <text x="40" y="29" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e2e8f0">SOCKET RING</text>
      </g>
      <g transform="translate(0 108)">
        <rect x="0" y="0" width="500" height="46" rx="6" fill="url(#breaker)"/>
        <rect x="10" y="12" width="18" height="22" rx="3" fill="#22c55e"/>
        <text x="40" y="29" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e2e8f0">COOKER</text>
      </g>
      <g transform="translate(0 162)">
        <rect x="0" y="0" width="500" height="46" rx="6" fill="url(#breaker)"/>
        <rect x="10" y="12" width="18" height="22" rx="3" fill="#22c55e"/>
        <text x="40" y="29" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e2e8f0">SHOWER</text>
      </g>
      <g transform="translate(0 216)">
        <rect x="0" y="0" width="500" height="46" rx="6" fill="url(#breaker)"/>
        <rect x="10" y="12" width="18" height="22" rx="3" fill="#22c55e"/>
        <text x="40" y="29" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#e2e8f0">SPARE / EV</text>
      </g>
    </g>
  </g>

  <rect x="0" y="650" width="1200" height="100" fill="rgba(0,0,0,0.25)"/>
  <text x="50" y="710" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#f59e0b" letter-spacing="1.5">CONSUMER UNIT UPGRADE COMPLETE</text>
</svg>
